<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>XMR Swap Flow Test</title></head>
<body style="background:#111;color:#0f0;font-family:monospace;padding:20px">
<h2>00-Protocol XMR Swap — Full Flow Test</h2>
<pre id="log"></pre>
<script type="module">
import { XmrSwap, STATE, computeSharedXmrAddress } from './xmr-swap.js?v=2';
import * as XMR from './xmr-swap-crypto.js?v=3';
import { ed25519 } from 'https://esm.sh/@noble/curves@1.8.1/ed25519';

const log = document.getElementById('log');
function print(msg, ok) {
  const color = ok === true ? '#0f0' : ok === false ? '#f44' : '#ff0';
  log.innerHTML += `<span style="color:${color}">${msg}</span>\n`;
}

async function runSwapTest() {
  print('═══ FULL BCH ↔ XMR SWAP FLOW TEST ═══\n');
  print('Scenario: Bob has 0.001 BCH, wants XMR. Alice has XMR, wants BCH.\n');

  const bchAmount = 100000;  // 0.001 BCH in sats
  const xmrAmount = 10000000000n; // 0.01 XMR in piconero

  // ── STEP 1: Initialize both parties ──
  print('STEP 1: KEY EXCHANGE', null);

  const bob = new XmrSwap('bob', {
    bchAmount, xmrAmount,
    counterpartyNostrPub: 'alice_nostr_pub_placeholder'
  });

  const alice = new XmrSwap('alice', {
    swapId: bob.swapId,  // same swap ID
    bchAmount, xmrAmount,
    counterpartyNostrPub: 'bob_nostr_pub_placeholder'
  });

  // Generate keys
  const bobKeysMsg = bob.generateKeys();
  const aliceKeysMsg = alice.generateKeys();

  print(`  Bob secp pub:   ${bobKeysMsg.secpPub.slice(0, 20)}...`);
  print(`  Bob ed pub:     ${bobKeysMsg.edPub.slice(0, 20)}...`);
  print(`  Alice secp pub: ${aliceKeysMsg.secpPub.slice(0, 20)}...`);
  print(`  Alice ed pub:   ${aliceKeysMsg.edPub.slice(0, 20)}...`);

  // Exchange and verify keys
  const bobVerified = bob.receiveKeys(aliceKeysMsg);
  const aliceVerified = alice.receiveKeys(bobKeysMsg);

  print(`  Bob verified Alice's DLEQ:   ${bobVerified}`, bobVerified);
  print(`  Alice verified Bob's DLEQ:   ${aliceVerified}`, aliceVerified);

  // Check shared XMR address matches
  const addrMatch = bob.sharedXmrAddress.address === alice.sharedXmrAddress.address;
  print(`  Shared XMR address matches:  ${addrMatch}`, addrMatch);
  print(`  Shared XMR addr: ${bob.sharedXmrAddress.address.slice(0, 30)}...`);

  print(`  Bob state:   ${bob.state}`, bob.state === STATE.BOB_KEYS_VERIFIED);
  print(`  Alice state: ${alice.state}`, alice.state === STATE.ALICE_KEYS_VERIFIED);

  // ── STEP 2: Bob locks BCH ──
  print('\nSTEP 2: BOB LOCKS BCH', null);

  const currentHeight = 850000; // mock block height
  const lockInfo = bob.prepareBchLock(currentHeight);

  print(`  Redeem script: ${XMR.b2h(lockInfo.redeemScript).slice(0, 40)}... (${lockInfo.redeemScript.length}B)`);
  print(`  P2SH output:   ${XMR.b2h(lockInfo.p2shOutput).slice(0, 40)}...`);
  print(`  Locktime:      ${lockInfo.locktime}`);
  print(`  Amount:        ${lockInfo.amount} sats`);

  // Mock: Bob broadcasts and records
  bob.setBchLockTx('mock_bch_txid_1234', 0);
  print(`  Bob state: ${bob.state}`, bob.state === STATE.BOB_BCH_LOCKED);

  // Alice verifies (simplified — in production, parse TX)
  alice.verifyBchLock('mock_tx_hex', bchAmount, lockInfo.locktime);
  alice.bchLockTxid = 'mock_bch_txid_1234';
  alice.bchLockVout = 0;
  print(`  Alice verified BCH lock`);

  // ── STEP 3: Alice locks XMR ──
  print('\nSTEP 3: ALICE LOCKS XMR', null);

  const xmrLockInfo = alice.prepareXmrLock();
  print(`  XMR destination: ${xmrLockInfo.destinationAddress.slice(0, 30)}...`);
  print(`  XMR amount: ${xmrLockInfo.amount.toString()} piconero`);
  print(`  View key (for Bob): ${xmrLockInfo.viewKey.slice(0, 20)}...`);

  // Mock: Alice broadcasts XMR
  alice.setXmrLockTx('mock_xmr_txid_5678');
  print(`  Alice state: ${alice.state}`, alice.state === STATE.ALICE_XMR_LOCKED);

  // Bob verifies XMR lock (mock — in production, scan with view key)
  bob.verifyXmrLock(true);
  print(`  Bob verified XMR lock`);
  print(`  Bob state: ${bob.state}`, bob.state === STATE.BOB_XMR_VERIFIED);

  // ── STEP 4: Bob sends adaptor signature ──
  print('\nSTEP 4: ADAPTOR SIGNATURE', null);

  const adaptorSigJson = bob.createAdaptorSig();
  print(`  Bob created adaptor sig`);
  print(`  Bob state: ${bob.state}`, bob.state === STATE.BOB_ADAPTOR_SENT);

  // Alice receives and verifies
  const adaptorOk = alice.receiveAdaptorSig(adaptorSigJson);
  print(`  Alice verified adaptor sig: ${adaptorOk}`, adaptorOk);
  print(`  Alice state: ${alice.state}`, alice.state === STATE.ALICE_ADAPTOR_RECV);

  // ── STEP 5: Alice decrypts and claims BCH ──
  print('\nSTEP 5: ALICE CLAIMS BCH', null);

  const claimData = alice.decryptAndClaim();
  print(`  Claim signature: ${XMR.b2h(claimData.signature).slice(0, 40)}... (${claimData.signature.length}B)`);
  print(`  Redeem script:   ${XMR.b2h(claimData.redeemScript).slice(0, 40)}...`);
  print(`  Alice state: ${alice.state}`, alice.state === STATE.ALICE_BCH_CLAIMED);

  // Build claim scriptSig
  const scriptSig = alice.buildClaimScriptSig(claimData.signature, claimData.redeemScript);
  print(`  ScriptSig: ${XMR.b2h(scriptSig).slice(0, 40)}... (${scriptSig.length}B)`);

  // ── STEP 6: Bob recovers Alice's secret and sweeps XMR ──
  print('\nSTEP 6: BOB RECOVERS XMR', null);

  // Bob sees Alice's on-chain claim TX and extracts the 64-byte signature
  const recoveredSecret = bob.recoverSecret(claimData.signature);
  print(`  Recovered secret: ${recoveredSecret !== null}`, recoveredSecret !== null);

  if (recoveredSecret !== null) {
    // Verify: recovered secret matches Alice's actual secret
    const aliceActualSecret = alice.myKeys.secret;
    const secretMatch = recoveredSecret === aliceActualSecret;
    print(`  Secret matches Alice's key: ${secretMatch}`, secretMatch);

    if (!secretMatch) {
      // Debug: show values
      print(`    Alice's secret: ${aliceActualSecret.toString(16).slice(0, 20)}...`, false);
      print(`    Recovered:      ${recoveredSecret.toString(16).slice(0, 20)}...`, false);
    }

    // Compute full XMR spend key
    const sweepData = bob.computeXmrSweepKey();
    print(`  XMR spend key: ${XMR.b2h(sweepData.spendKey).slice(0, 20)}...`);
    print(`  XMR address:   ${sweepData.address.slice(0, 30)}...`);
    print(`  Bob state: ${bob.state}`, bob.state === STATE.BOB_COMPLETE);

    // Verify: compute the expected public key from the full spend key
    let fullSecretScalar = 0n;
    for (let i = 31; i >= 0; i--) fullSecretScalar = (fullSecretScalar << 8n) | BigInt(sweepData.spendKey[i]);
    const fullPub = ed25519.ExtendedPoint.BASE.multiply(fullSecretScalar);
    const fullPubBytes = new Uint8Array(fullPub.toRawBytes());
    const matchesShared = XMR.b2h(fullPubBytes) === XMR.b2h(bob.sharedXmrAddress.sharedSpendPub);
    print(`  Spend key → shared pubkey: ${matchesShared}`, matchesShared);
  }

  // ── STEP 7: Serialization test ──
  print('\nSTEP 7: SERIALIZATION', null);

  const bobSerialized = bob.serialize();
  const bobRestored = XmrSwap.deserialize(bobSerialized);
  print(`  Bob serialize/deserialize: state=${bobRestored.state}`, bobRestored.state === STATE.BOB_COMPLETE);
  print(`  SwapId preserved: ${bobRestored.swapId === bob.swapId}`, bobRestored.swapId === bob.swapId);

  // ── Summary ──
  print('\n═══ SWAP FLOW COMPLETE ═══');
  print(`  Alice: ${alice.state} (got BCH)`);
  print(`  Bob:   ${bob.state} (got XMR)`);
}

runSwapTest().catch(e => print(`ERROR: ${e.message}\n${e.stack}`, false));
</script>
</body>
</html>
