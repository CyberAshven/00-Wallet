<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>XMR RPC Test</title></head>
<body style="background:#111;color:#0f0;font-family:monospace;padding:20px">
<h2>00-Protocol — Monero RPC Connection Test</h2>
<pre id="log"></pre>
<script type="module">
import * as XMR from './xmr-rpc.js?v=1';
import * as Crypto from './xmr-swap-crypto.js?v=3';

const log = document.getElementById('log');
function print(msg, ok) {
  const color = ok === true ? '#0f0' : ok === false ? '#f44' : '#ff0';
  log.innerHTML += `<span style="color:${color}">${msg}</span>\n`;
}

async function runTests() {
  print('═══ MONERO RPC CONNECTION TEST ═══\n');

  // ── TEST 1: Connect to XMR node via proxy ──
  print('TEST 1: CONNECTION', null);
  const conn = await XMR.testConnection();
  print(`  Connected: ${conn.connected}`, conn.connected);
  if (conn.connected) {
    print(`  Node: ${conn.name}`);
    print(`  Height: ${conn.height}`);
    print(`  Network: ${conn.network}`);
    print(`  Version: ${conn.version}`);
  } else {
    print(`  Error: ${conn.error}`, false);
    // Try auto-connect
    print('  Trying auto-connect...');
    const auto = await XMR.autoConnect();
    print(`  Auto-connect: ${auto.connected}`, auto.connected);
    if (!auto.connected) {
      print('ABORT: no XMR node available', false);
      return;
    }
  }

  // ── TEST 2: Get block count ──
  print('\nTEST 2: BLOCK COUNT', null);
  try {
    const count = await XMR.getBlockCount();
    print(`  Block count: ${count}`, count > 3000000);
  } catch(e) {
    print(`  Error: ${e.message}`, false);
  }

  // ── TEST 3: Get latest block header ──
  print('\nTEST 3: LATEST BLOCK', null);
  try {
    const count = await XMR.getBlockCount();
    const header = await XMR.getBlockHeaderByHeight(count - 1);
    print(`  Height: ${header.height}`);
    print(`  Hash: ${header.hash.slice(0, 20)}...`);
    print(`  Timestamp: ${new Date(header.timestamp * 1000).toISOString()}`);
    print(`  Nonce: ${header.nonce}`);
    print(`  Num TXs: ${header.num_txes}`, true);
  } catch(e) {
    print(`  Error: ${e.message}`, false);
  }

  // ── TEST 4: Get a block with transactions ──
  print('\nTEST 4: BLOCK WITH TXS', null);
  try {
    const count = await XMR.getBlockCount();
    // Go back a few blocks to ensure it has TXs
    let blockWithTxs = null;
    for (let h = count - 2; h > count - 20; h--) {
      const block = await XMR.getBlock(h);
      const blockJson = JSON.parse(block.json);
      if (blockJson.tx_hashes && blockJson.tx_hashes.length > 0) {
        blockWithTxs = { height: h, json: blockJson, txCount: blockJson.tx_hashes.length };
        break;
      }
    }
    if (blockWithTxs) {
      print(`  Found block ${blockWithTxs.height} with ${blockWithTxs.txCount} TXs`, true);

      // Fetch first TX
      const txHash = blockWithTxs.json.tx_hashes[0];
      print(`  Fetching TX: ${txHash.slice(0, 20)}...`);
      const txData = await XMR.getTransactions([txHash]);
      if (txData.txs && txData.txs.length > 0) {
        const tx = txData.txs[0];
        const txJson = JSON.parse(tx.as_json);
        print(`  TX version: ${txJson.version}`);
        print(`  Inputs: ${txJson.vin ? txJson.vin.length : 0}`);
        print(`  Outputs: ${txJson.vout ? txJson.vout.length : 0}`);
        print(`  Extra: ${txJson.extra ? txJson.extra.length : 0} bytes`);

        // Parse TX extra
        const extraBytes = new Uint8Array(txJson.extra);
        const parsed = XMR.parseTxExtra(extraBytes);
        print(`  TX pubkey: ${parsed.txPubKey ? Crypto.b2h(parsed.txPubKey).slice(0, 20) + '...' : 'none'}`, !!parsed.txPubKey);
        print(`  Additional keys: ${parsed.additionalPubKeys.length}`);
        print(`  RCT type: ${txJson.rct_signatures ? txJson.rct_signatures.type : 'none'}`);
      } else {
        print(`  Failed to fetch TX`, false);
      }
    } else {
      print(`  No block with TXs found in last 20 blocks`, false);
    }
  } catch(e) {
    print(`  Error: ${e.message}`, false);
  }

  // ── TEST 5: Output scanning with test keys ──
  print('\nTEST 5: OUTPUT SCAN LOGIC', null);
  try {
    // Generate a test Monero keypair
    const spendPriv = Crypto.generateXmrPrivateKey();
    const spendPub = Crypto.xmrPubFromPriv(spendPriv);
    const viewPrivLE = Crypto.xmrViewKeyFromSpend(spendPriv);
    const viewPub = Crypto.xmrPubFromPriv(viewPrivLE);

    // Convert view key to scalar
    let viewScalar = 0n;
    for (let i = 31; i >= 0; i--) viewScalar = (viewScalar << 8n) | BigInt(viewPrivLE[i]);

    const addr = Crypto.xmrAddress(spendPub, viewPub, 18);

    print(`  Test spend pub: ${Crypto.b2h(spendPub).slice(0, 20)}...`);
    print(`  Test view pub:  ${Crypto.b2h(viewPub).slice(0, 20)}...`);
    print(`  Test address:   ${addr.slice(0, 30)}...`);

    // Try scanning a recent block (won't find anything but tests the pipeline)
    const count = await XMR.getBlockCount();
    let scannedTxs = 0;
    for (let h = count - 5; h < count; h++) {
      try {
        const block = await XMR.getBlock(h);
        const blockJson = JSON.parse(block.json);
        const hashes = blockJson.tx_hashes || [];
        if (hashes.length === 0) continue;

        const txData = await XMR.getTransactions(hashes.slice(0, 3)); // scan first 3 TXs
        if (txData.txs) {
          for (const tx of txData.txs) {
            if (!tx.as_json) continue;
            const txJson = JSON.parse(tx.as_json);
            const result = XMR.scanTransaction(txJson, viewScalar, spendPub);
            scannedTxs++;
            // We don't expect to find anything with random keys
          }
        }
      } catch(e) { /* skip */ }
    }
    print(`  Scanned ${scannedTxs} TXs (no matches expected with random key)`, scannedTxs > 0);
    print(`  Scan pipeline: OK`, true);
  } catch(e) {
    print(`  Error: ${e.message}\n  ${e.stack}`, false);
  }

  // ── TEST 6: Varint encoding ──
  print('\nTEST 6: VARINT ENCODING', null);
  const tests = [[0, '00'], [1, '01'], [127, '7f'], [128, '8001'], [255, 'ff01'], [300, 'ac02']];
  let allPass = true;
  for (const [val, expected] of tests) {
    const encoded = Crypto.b2h(XMR.varintEncode(val));
    const ok = encoded === expected;
    if (!ok) { print(`  varint(${val}) = ${encoded}, expected ${expected}`, false); allPass = false; }
  }
  if (allPass) print(`  All varint tests passed`, true);

  print('\n═══ ALL TESTS COMPLETE ═══', true);
}

runTests().catch(e => print(`FATAL: ${e.message}\n${e.stack}`, false));
</script>
</body>
</html>
